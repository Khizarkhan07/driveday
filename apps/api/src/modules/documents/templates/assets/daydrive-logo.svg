<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="100%" stop-color="#0047FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="white"/>

  <!-- Modern DD Monogram -->
  <g transform="translate(110,80)">
    <path d="M90 0 L90 250
             C90 250 260 250 260 125
             C260 0 90 0 90 0 Z"
          fill="none"
          stroke="#081B3A"
          stroke-width="32"
          stroke-linejoin="round"/>

    <path d="M170 0
             C330 0 430 90 430 125
             C430 160 330 250 170 250"
          fill="none"
          stroke="url(#blueGrad)"
          stroke-width="32"
          stroke-linecap="round"/>

    <!-- Road -->
    <path d="M105 220
             C180 170 250 120 360 70"
          fill="none"
          stroke="#081B3A"
          stroke-width="22"
          stroke-linecap="round"/>

    <path d="M150 200
             C215 155 270 120 340 85"
          fill="none"
          stroke="white"
          stroke-width="8"
          stroke-dasharray="16 14"
          stroke-linecap="round"/>
  </g>

  <!-- Brand Name -->
  <text x="560" y="220"
        font-family="Helvetica, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        fill="#081B3A"
        letter-spacing="2">DAY</text>

  <text x="760" y="220"
        font-family="Helvetica, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        fill="#0047FF"
        letter-spacing="2">DRIVE</text>

  <text x="565" y="285"
        font-family="Helvetica, Arial, sans-serif"
        font-size="30"
        fill="#5C6B82"
        letter-spacing="10">AUTO INSURANCE</text>

  <line x1="565" y1="305" x2="980" y2="305"
        stroke="#D9E2F2" stroke-width="3"/>
</svg>
